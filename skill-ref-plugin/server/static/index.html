<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Workflow Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e0e0e0; }
  svg { width: 100vw; height: 100vh; display: block; }

  #controls { position: fixed; top: 16px; left: 16px; display: flex; gap: 12px; z-index: 10; align-items: center; }
  #skill-select { padding: 8px 12px; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; font-size: 13px; outline: none; min-width: 200px; }
  #skill-select:focus { border-color: #4A90D9; }
  #search { padding: 8px 12px; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; font-size: 13px; outline: none; width: 200px; }
  #search::placeholder { color: #555; }
  #search:focus { border-color: #4A90D9; }

  #detail { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: #1a1a2e; border-left: 1px solid #333; padding: 24px 20px; z-index: 10; transition: right 0.3s ease; overflow-y: auto; }
  #detail.open { right: 0; }
  #detail h2 { font-size: 16px; margin-bottom: 4px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; }
  .badge.skill-root { background: #4A90D920; color: #4A90D9; }
  .badge.step { background: #F39C1220; color: #F39C12; }
  .badge.agent-leaf { background: #27AE6020; color: #27AE60; }
  #detail .desc { color: #aaa; font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
  #detail .section-title { font-size: 12px; color: #666; font-weight: 600; margin: 12px 0 6px; }
  #detail .callee-item, #detail .loopback-item { font-size: 12px; color: #bbb; padding: 3px 0; }
  .callee-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-left: 4px; }
  .callee-tag.skill { background: #4A90D930; color: #4A90D9; }
  .callee-tag.agent { background: #27AE6030; color: #27AE60; }
  .callee-tag.logic { background: #F39C1230; color: #F39C12; }
  #detail-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
  #detail-close:hover { color: #e0e0e0; }

  #legend { position: fixed; bottom: 16px; left: 16px; display: flex; gap: 16px; background: #1a1a2e; padding: 8px 16px; border-radius: 8px; border: 1px solid #333; z-index: 10; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; }
  #stats { position: fixed; bottom: 16px; right: 16px; background: #1a1a2e; padding: 8px 16px; border-radius: 8px; border: 1px solid #333; z-index: 10; font-size: 11px; color: #666; }
  #ws-status { position: fixed; top: 20px; right: 16px; width: 10px; height: 10px; border-radius: 50%; z-index: 10; background: #e74c3c; }
  #ws-status.connected { background: #27AE60; }
</style>
</head>
<body>
<div id="controls">
  <select id="skill-select"><option value="__all__">All Root Workflows</option></select>
  <input type="text" id="search" placeholder="Search..." />
</div>
<div id="ws-status" title="Disconnected"></div>
<div id="detail">
  <button id="detail-close">&times;</button>
  <h2 id="d-name"></h2>
  <span id="d-badge" class="badge"></span>
  <div id="d-step" style="font-size:12px;color:#888;margin-bottom:8px"></div>
  <p id="d-desc" class="desc"></p>
  <div id="d-callees-section"><div class="section-title">Callees</div><div id="d-callees"></div></div>
  <div id="d-loopbacks-section"><div class="section-title">Loopbacks</div><div id="d-loopbacks"></div></div>
</div>
<div id="legend">
  <div class="legend-item"><svg width="14" height="14"><rect width="14" height="14" rx="3" fill="#4A90D9"/></svg> Skill</div>
  <div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#27AE60"/></svg> Agent</div>
  <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,7 7,13 1,7" fill="#F39C12"/></svg> Logic</div>
  <div class="legend-item"><svg width="30" height="14"><line x1="0" y1="7" x2="30" y2="7" stroke="#555" stroke-width="2"/></svg> Flow</div>
  <div class="legend-item"><svg width="30" height="14"><line x1="0" y1="7" x2="30" y2="7" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/></svg> Loopback</div>
</div>
<div id="stats"></div>
<svg></svg>
<script>
const COLORS = { skill: '#4A90D9', agent: '#27AE60', logic: '#F39C12' };
let workflowData = null, svg, g, zoomBehavior;

function init() {
  svg = d3.select('svg');
  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrow-flow').attr('viewBox','0 0 10 10').attr('refX',10).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill','#555');
  defs.append('marker').attr('id','arrow-loop').attr('viewBox','0 0 10 10').attr('refX',10).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill','#e74c3c');
  g = svg.append('g').attr('transform','translate(60,80)');
  zoomBehavior = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBehavior);
}

function renderSelected() {
  const sel = document.getElementById('skill-select').value;
  if (!workflowData) return;
  let trees;
  if (sel === '__all__') {
    const calledNames = new Set();
    workflowData.skills.forEach(s => s.steps.forEach(st => st.callees.forEach(c => { if (c.type === 'skill') calledNames.add(c.name); })));
    trees = workflowData.trees.filter(t => !calledNames.has(t.name));
  } else {
    trees = workflowData.trees.filter(t => t.name === sel);
  }
  renderTrees(trees);
}

function renderTrees(trees) {
  g.selectAll('*').remove();
  if (!trees.length) return;
  let xOffset = 0;
  let totalSteps = 0, totalAgents = 0, totalSkills = trees.length;

  trees.forEach((rootTree, ti) => {
    const h = d3.hierarchy(rootTree, d => d.children);
    d3.tree().nodeSize([200, 90])(h);
    h.each(d => { d.x += xOffset; });

    const tg = g.append('g');

    // Flow links
    tg.selectAll('.fl').data(h.links()).enter().append('path')
      .attr('d', d3.linkVertical().x(d => d.x).y(d => d.y))
      .attr('fill','none').attr('stroke','#555').attr('stroke-width',1.5).attr('marker-end','url(#arrow-flow)');

    // Loopback arrows
    h.each(d => {
      if (!d.data.loopbacks || !d.data.loopbacks.length) return;
      d.data.loopbacks.forEach(lb => {
        let target = null;
        h.each(t => { if (t.data.stepNumber === lb.targetStep) target = t; });
        if (target) {
          const ox = 100 + ti * 10;
          tg.append('path')
            .attr('d', `M${d.x+90},${d.y} C${d.x+ox},${d.y} ${target.x+ox},${target.y} ${target.x+90},${target.y}`)
            .attr('fill','none').attr('stroke','#e74c3c').attr('stroke-width',1.2).attr('stroke-dasharray','4,3')
            .attr('marker-end','url(#arrow-loop)').attr('opacity',0.6);
        }
      });
    });

    // Nodes
    const nodes = tg.selectAll('.nd').data(h.descendants()).enter().append('g')
      .attr('transform', d => `translate(${d.x},${d.y})`)
      .attr('cursor','pointer')
      .on('click', (e,d) => showDetail(d.data))
      .on('mouseover', (e,d) => {
        const ids = new Set([d.data.id]);
        if (d.parent) ids.add(d.parent.data.id);
        if (d.children) d.children.forEach(c => ids.add(c.data.id));
        g.selectAll('g > g > g').transition().duration(200).attr('opacity', n => {
          const nd = d3.select(n).datum();
          return nd && ids.has(nd.data?.id) ? 1 : 0.2;
        });
      })
      .on('mouseout', () => g.selectAll('g > g > g').transition().duration(200).attr('opacity',1));

    nodes.each(function(d) {
      const el = d3.select(this);
      const dt = d.data;
      if (dt.type === 'skill-root') {
        el.append('rect').attr('x',-90).attr('y',-22).attr('width',180).attr('height',44).attr('rx',8).attr('fill','#1a1a2e').attr('stroke',COLORS.skill).attr('stroke-width',2);
        el.append('text').text(dt.name).attr('text-anchor','middle').attr('dy',4).attr('fill',COLORS.skill).attr('font-size','12px').attr('font-weight',600);
        totalSkills++;
      } else if (dt.type === 'agent-leaf') {
        el.append('circle').attr('r',18).attr('fill','#0d1f0d').attr('stroke',COLORS.agent).attr('stroke-width',2);
        el.append('text').text(dt.name).attr('text-anchor','middle').attr('dy',32).attr('fill','#aaa').attr('font-size','10px');
        totalAgents++;
      } else {
        totalSteps++;
        const isLogic = dt.callees && dt.callees.length === 1 && dt.callees[0].type === 'logic';
        if (isLogic) {
          el.append('polygon').attr('points','0,-18 18,0 0,18 -18,0').attr('fill','#1f1a0d').attr('stroke',COLORS.logic).attr('stroke-width',1.5);
          el.append('text').text(dt.stepNumber||'').attr('text-anchor','middle').attr('dy',32).attr('fill','#888').attr('font-size','9px');
          el.append('text').text(trunc(dt.name,20)).attr('text-anchor','middle').attr('dy',44).attr('fill','#666').attr('font-size','9px');
        } else {
          const hasSkill = dt.callees && dt.callees.some(c=>c.type==='skill');
          el.append('rect').attr('x',-90).attr('y',-22).attr('width',180).attr('height',44).attr('rx',6).attr('fill','#12121f')
            .attr('stroke', hasSkill ? COLORS.skill : '#444').attr('stroke-width',1.5);
          const lbl = dt.stepNumber ? `${dt.stepNumber} ${trunc(dt.name,18)}` : trunc(dt.name,22);
          el.append('text').text(lbl).attr('text-anchor','middle').attr('dy',2).attr('fill','#e0e0e0').attr('font-size','11px');
          if (dt.callees && dt.callees.length && !d.children?.length) {
            const names = dt.callees.filter(c=>c.type!=='logic').map(c=>c.name).join(', ');
            if (names) el.append('text').text(trunc(names,28)).attr('text-anchor','middle').attr('dy',14).attr('fill','#666').attr('font-size','9px');
          }
        }
      }
    });

    let minX=Infinity, maxX=-Infinity;
    h.each(d => { minX=Math.min(minX,d.x); maxX=Math.max(maxX,d.x); });
    xOffset = maxX + 350;
  });

  document.getElementById('stats').textContent = `${totalSkills} skills, ${totalSteps} steps, ${totalAgents} agents`;
}

function trunc(s,n) { return s && s.length > n ? s.slice(0,n)+'...' : s||''; }

function showDetail(d) {
  document.getElementById('d-name').textContent = d.name;
  const b = document.getElementById('d-badge'); b.textContent = d.type; b.className = `badge ${d.type}`;
  document.getElementById('d-step').textContent = d.stepNumber || '';
  document.getElementById('d-desc').textContent = d.description || '';
  const cd = document.getElementById('d-callees'); cd.innerHTML = '';
  if (d.callees?.length) { d.callees.forEach(c => { const e=document.createElement('div'); e.className='callee-item'; e.innerHTML=`${c.name} <span class="callee-tag ${c.type}">${c.type}</span>`; cd.appendChild(e); }); }
  else cd.innerHTML='<div class="callee-item" style="color:#444">(none)</div>';
  const ld = document.getElementById('d-loopbacks'); ld.innerHTML = '';
  if (d.loopbacks?.length) { d.loopbacks.forEach(lb => { const e=document.createElement('div'); e.className='loopback-item'; e.textContent=`→ ${lb.targetStep}: ${lb.condition}`; ld.appendChild(e); }); }
  else ld.innerHTML='<div class="loopback-item" style="color:#444">(none)</div>';
  document.getElementById('detail').classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => { document.getElementById('detail').classList.remove('open'); });
document.getElementById('skill-select').addEventListener('change', () => renderSelected());
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { g.selectAll('g > g > g').transition().duration(200).attr('opacity',1); return; }
  g.selectAll('g > g > g').each(function() {
    const d = d3.select(this).datum();
    d3.select(this).transition().duration(200).attr('opacity', d && d.data.name.toLowerCase().includes(q) ? 1 : 0.1);
  });
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key==='Enter') {
    const q = e.target.value.toLowerCase().trim(); let found=null;
    g.selectAll('g > g > g').each(function(d) { if (!found && d && d.data.name.toLowerCase().includes(q)) found=d; });
    if (found) { const t=d3.zoomIdentity.translate(window.innerWidth/2-found.x,window.innerHeight/2-found.y).scale(1.2); svg.transition().duration(500).call(zoomBehavior.transform,t); }
  }
});

function connectWS() {
  const ws = new WebSocket(`ws://${location.host}`);
  const ind = document.getElementById('ws-status');
  ws.onopen = () => { ind.className='connected'; ind.title='Connected'; };
  ws.onmessage = e => { const m=JSON.parse(e.data); if (m.type==='full') { workflowData=m.data; populateSelect(); renderSelected(); } };
  ws.onclose = () => { ind.className=''; ind.title='Disconnected'; setTimeout(connectWS,2000); };
}

function populateSelect() {
  const sel = document.getElementById('skill-select'), cur = sel.value;
  sel.innerHTML = '<option value="__all__">All Root Workflows</option>';
  if (!workflowData) return;
  const cn = new Set();
  workflowData.skills.forEach(s => s.steps.forEach(st => st.callees.forEach(c => { if (c.type==='skill') cn.add(c.name); })));
  const roots = workflowData.trees.filter(t => !cn.has(t.name));
  const subs = workflowData.trees.filter(t => cn.has(t.name));
  roots.forEach(t => { const o=document.createElement('option'); o.value=t.name; o.textContent=t.name; sel.appendChild(o); });
  if (subs.length) { const gr=document.createElement('optgroup'); gr.label='Sub-workflows'; subs.forEach(t => { const o=document.createElement('option'); o.value=t.name; o.textContent=t.name; gr.appendChild(o); }); sel.appendChild(gr); }
  sel.value = cur || '__all__';
}

init(); connectWS();
</script>
</body>
</html>
